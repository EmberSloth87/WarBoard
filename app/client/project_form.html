<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarBoard</title>
    <link rel="stylesheet" href="static/site.css">
    <script src="js/project_form.js"></script>
</head>
<body>
    <nav class="navbar is-dark">
        <div class="navbar-brand">
            <span class="navbar-item is-size-4 has-text-weight-bold">Edit Project</span>
        </div>
    </nav>

    <main class="container is-max-desktop pt-6">

        <form id="details-form" method="POST" enctype="multipart/form-data" class="box">
            <h2 class="title is-4">
                <span class="text">
                    <span>Project</span>
                </span>
            </h2>
            
            <div class="columns">
                <div class="column is-half">
                    <div class="field">
                        <label for="name" class="label">
                            Project Name
                            <span class="has-text-danger">*</span>
                        </label>
                        <div class="control">
                            <input type="text" id="name" name="name" required class="input">
                        </div>
                    </div>
                </div>

                <!-- Future feature: Project Color -->
            <!--- 
                <div class="column is-half">
                    <div class="field">
                        <label for="projectColor" class="label">Project Color</label>
                        <div class="control">
                            <input type="color" id="projectColor" name="projectColor" class="input" value="#ff0000">
                        </div>
                    </div>
                </div>
            -->
            </div>

            <div class="field">
                <label for="name" class="label">
                    Project Description
                    <span class="has-text-danger">*</span>
                </label>
                <div class="control">
                    <textarea id="description" name="description" class="textarea mt-2" placeholder="Enter a brief description of the project..."></textarea>
                </div>
            </div>

            <div class="box">
                <h3 class="title is-5">Associated Deadlines</h3>
                <div id="associated-deadlines-container" class="box has-background-grey-lighter">
                    <!-- Dynamically populated list of associated deadlines will go here -->
                </div>
                
                <h3 class="title is-5">Associated Tasks</h3>
                <div id="associated-tasks-container" class="box has-background-grey-lighter">
                    <!-- Dynamically populated list of associated tasks will go here -->
                </div>
            </div>


            <div class="field is-grouped mt-5">
                <div class="control">
                    <button type="submit" class="button is-primary">
                        <span>Update Details</span>
                    </button>
                </div>
    
                <div class="control">
                    <button type="button" class="button is-light">
                        <span>Cancel</span>
                    </button>
                </div>

                <div class="control is-expanded"></div>

                <div class="control">
                    <button type="button" id="delete-project-btn" class="button is-danger">
                        <span>Delete Project</span>
                    </button>
                </div>
            </div>
        </form>
    </main>
</body>
</html>

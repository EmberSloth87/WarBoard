<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarBoard</title>
    <link rel="stylesheet" href="static/site.css">
    <script src="js/project_form.js"></script>
</head>
<body>
    <nav class="navbar is-dark">
        <div class="navbar-brand">
            <span class="navbar-item is-size-4 has-text-weight-bold">Edit Project</span>
        </div>
    </nav>

    <main class="container is-max-desktop pt-6">

        <form id="details-form" method="POST" enctype="multipart/form-data" class="box">
            <h2 class="title is-4">
                <span class="text">
                    <span>Project</span>
                </span>
            </h2>
            
            <div class="field">
                <label for="name" class="label">
                    Project Name
                    <span class="has-text-danger">*</span>
                </label>
                <div class="control">
                    <input type="text" id="name" name="name" required class="input">
                </div>
            </div>
            
            


            <div class="field is-grouped mt-5">
                <div class="control">
                    <button type="submit" class="button is-primary">
                        <span>Update Details</span>
                    </button>
                </div>
    
                <div class="control">
                    <button type="button" class="button is-light">
                        <span>Cancel</span>
                    </button>
                </div>

                <div class="control is-expanded"></div>

                <div class="control">
                    <button type="button" id="delete-deadline-btn" class="button is-danger">
                        <span>Delete Deadline</span>
                    </button>
                </div>
            </div>
        </form>
    </main>
</body>
</html>

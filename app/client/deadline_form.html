<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarBoard</title>
    <link rel="stylesheet" href="static/site.css">
    <script src="js/deadline_form.js"></script>
</head>
<body>
    <nav class="navbar is-dark">
        <div class="navbar-brand">
            <span class="navbar-item is-size-4 has-text-weight-bold">Edit Deadline</span>
        </div>
    </nav>

    <main class="container is-max-desktop pt-6">

        <form id="details-form" method="POST" enctype="multipart/form-data" class="box">
            <h2 class="title is-4">
                <span class="text">
                    <span>Deadline</span>
                </span>
            </h2>
            
            <div class="field">
                <label for="title" class="label">
                    Deadline Title
                    <span class="has-text-danger">*</span>
                </label>
                <div class="control">
                    <input type="text" id="title" name="title" required class="input">
                </div>
            </div>
            
            <div class="columns">
                <div class="column is-half">
                    <div class="field">
                        <label for="task-project" class="label">Project</label>
                        <div class="control">
                            <div class="select is-fullwidth">
                                <select id="task-project">
                                <option value="">No Project</option>
                                <!-- Dynamically populated project options will go here -->
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="column is-half">
                    <div class="field">
                        <label for="deadline-time" class="label">
                            Deadline Time
                            <span class="has-text-danger">*</span>
                        </label>
                        <div class="control">
                            <input type="time" id="deadline-time" name="deadline-time" class="input" placeholder="HH:MM (24-hour format)">
                        </div>
                    </div>
                </div>
            </div>


            <div class="field is-grouped mt-5">
                <div class="control">
                    <button type="submit" class="button is-primary">
                        <span>Update Details</span>
                    </button>
                </div>
    
                <div class="control">
                    <button type="button" class="button is-light">
                        <span>Cancel</span>
                    </button>
                </div>

                <div class="control is-expanded"></div>

                <div class="control">
                    <button type="button" id="delete-deadline-btn" class="button is-danger">
                        <span>Delete Deadline</span>
                    </button>
                </div>
            </div>
        </form>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarBoard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
    <script src="{{ url_for('static', filename='js/model.js') }}"></script>
    <script src="{{ url_for('static', filename='js/view.js') }}"></script>
    <script src="{{ url_for('static', filename='js/controller.js') }}"></script>
</head>
<body>
    <nav class="navbar is-dark">
        <div class="navbar-brand">
            <span class="navbar-item is-size-4 has-text-weight-bold">WARBOARD</span>
            <span class="navbar-item">"Create your plan of attack!"</span>
        </div>
    </nav>

    <div id="mainLayout" class="columns is-gapless" style="height: calc(100vh - 52px);">
        <aside class="column is-3 p-4 has-background-light" style="border-right: 1px solid #dbdbdb;">
            <div class="level">
                <div class="level-left"><h2 class="title is-4">Projects</h2></div>
                <div class="level-right"><button class="button is-primary is-small" id="addProjectBtn">+</button></div>
            </div>
            <div id="projectList" class="menu" style="max-height: calc(100vh - 120px); overflow-y: auto;">
                </div>
        </aside>

        <main class="column is-9">            
            <div class="board-container p-4">
                <div id="warboardColumns" class="columns is-variable is-1">
                    </div>
            </div>
        </main>
    </div>

    <div class="modal" id="taskModal">
        <div class="modal-background"></div>
        <div class="modal-card">
            <header class="modal-card-head"><p class="modal-card-title">Add Task</p></header>
            <section class="modal-card-body">
                <input type="text" id="taskNameInput" class="input mb-2" placeholder="Task Name">
                <div class="select is-fullwidth mb-2">
                    <select id="taskProjectSelect">
                        <option value="">No Project</option>
                    </select>
                </div>
                <input type="number" id="taskTimeInput" class="input" placeholder="Minutes Allocated">
            </section>
            <footer class="modal-card-foot">
                <button class="button is-success" id="saveTaskBtn">Save Task</button>
            </footer>
        </div>
    </div>
</body>
</html>
